services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon123
      POSTGRES_DB: pokemon_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pokemon:pokemon123@db:5432/pokemon_db
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: